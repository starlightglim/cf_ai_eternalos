# EternalOS Worker Configuration
# See https://developers.cloudflare.com/workers/wrangler/configuration/

name = "eternalos-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Durable Objects
[[durable_objects.bindings]]
name = "USER_DESKTOP"
class_name = "UserDesktop"

[[durable_objects.bindings]]
name = "DesktopChatAgent"
class_name = "DesktopChatAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["UserDesktop"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["DesktopChatAgent"]

# KV Namespaces
[[kv_namespaces]]
binding = "AUTH_KV"
id = "181861d860e5441a9467effa18a6fa16"

[[kv_namespaces]]
binding = "DESKTOP_KV"
id = "90801c76cfcb483c8dc6f6123ed8f79a"

# R2 Bucket (local dev uses Miniflare simulation)
# For production: wrangler r2 bucket create eternalos-files
[[r2_buckets]]
binding = "ETERNALOS_FILES"
bucket_name = "eternalos-files"

# Workers AI
[ai]
binding = "AI"
remote = true

# Optional local overrides in .dev.vars:
# IMAGE_ANALYSIS_MODEL=@cf/meta/llama-3.2-11b-vision-instruct
# AGENT_CHAT_MODEL=@cf/zai-org/glm-4.7-flash

# Environment
[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://eternalos.me,https://www.eternalos.me"

# JWT_SECRET is set via: wrangler secret put JWT_SECRET
# For local dev, set JWT_SECRET in .dev.vars file

# Google OAuth (optional — enables "Sign in with Google")
# GOOGLE_CLIENT_ID = "your-client-id.apps.googleusercontent.com"  # Set in .dev.vars or here
# GOOGLE_CLIENT_SECRET is set via: wrangler secret put GOOGLE_CLIENT_SECRET

# Scheduled triggers (cron jobs)
# Clean up old trashed items daily at 3:00 AM UTC
[triggers]
crons = ["0 3 * * *"]

# Development settings
[dev]
port = 8787
local_protocol = "http"
